name: Notify on Package Docs Validation Failure

on:
  workflow_run:
    workflows: ["Validate Package Docs"]
    types: [completed]

permissions:
  pull-requests: write

jobs:
  notify:
    name: Comment on PR
    if: github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Find PR number
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}/artifacts \
            --jq '.artifacts' 2>/dev/null || true)
          # workflow_run provides the head SHA — find the PR from it
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${HEAD_SHA}/pulls" \
            --jq '.[0].number' 2>/dev/null || true)
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Comment on PR
        if: steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
        run: |
          # Avoid duplicate comments
          EXISTING=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" \
            --jq '[.[] | select(.body | contains("Package docs validation failed"))] | length')
          if [ "$EXISTING" = "0" ]; then
            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body \
              "⚠️ **Package docs validation failed.** Please check the [workflow run](${RUN_URL}) for details.

          cc @elastic/ingest-docs"
          fi
